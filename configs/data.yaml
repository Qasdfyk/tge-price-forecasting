# Data download and cleaning configuration (Step 1)

paths:
  raw_dir: data/raw
  processed_dir: data/processed

# Historical date range.
# Keep 2–3 days for a smoke test on the first run.
# After verification, set e.g. start_date: "2025-07-01" (~1 year; TGE takes several minutes).
date_range:
  start_date: "2026-07-18"
  end_date: "2026-07-20"

tge:
  # No public TGE API — scrape the public RDN Fixing I results page.
  base_url: "https://tge.pl/energia-elektryczna-rdn"
  request_delay_seconds: 0.8
  max_retries: 3

pse:
  base_url: "https://api.raporty.pse.pl/api"
  # KSE load (15-min → aggregated to hourly)
  load_endpoint: "kse-load"
  # Daily plan: wind/PV generation + demand
  generation_endpoint: "pdgobpkd"
  page_size: 500

weather:
  # Open-Meteo Historical Weather API (no API key)
  archive_url: "https://archive-api.open-meteo.com/v1/archive"
  # Representative point: Warsaw (national MVP proxy)
  latitude: 52.23
  longitude: 21.01
  timezone: "Europe/Warsaw"
  hourly_variables:
    - temperature_2m
    - wind_speed_10m
    - wind_direction_10m
    - shortwave_radiation
    - cloud_cover
    - precipitation
    - relative_humidity_2m

cleaning:
  # PSE is 15-minute resolution — take the hourly mean for the model.
  pse_agg: "mean"
  # Timezone for all series after cleaning
  timezone: "Europe/Warsaw"
